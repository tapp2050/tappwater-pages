<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { background: white; display: flex; gap: 100px; padding: 60px; font-family: system-ui, -apple-system, sans-serif; justify-content: center; }
  .diagram { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .diagram-label { font-size: 14px; font-weight: 800; color: #1a1a2e; }
  .diagram-sub { font-size: 11px; color: #666; }
</style>
</head>
<body>

<!-- MALE TAP + FEMALE ADAPTER -->
<div class="diagram">
  <svg width="140" height="200" viewBox="0 0 140 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- TAP SPOUT (coming from top) -->
    <rect x="42" y="0" width="56" height="14" stroke="#1a1a2e" stroke-width="2.5" fill="none"/>

    <!-- Collar -->
    <rect x="38" y="14" width="64" height="6" stroke="#1a1a2e" stroke-width="2.5" fill="none"/>

    <!-- Male threaded section — EXTERNAL threads shown as zigzag/sawtooth profile -->
    <rect x="42" y="20" width="56" height="48" stroke="#1a1a2e" stroke-width="2.5" fill="none"/>

    <!-- Left side threads (sawtooth) -->
    <polyline points="42,24 36,27 42,30 36,33 42,36 36,39 42,42 36,45 42,48 36,51 42,54 36,57 42,60 36,63 42,66" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linejoin="round"/>

    <!-- Right side threads (sawtooth) -->
    <polyline points="98,24 104,27 98,30 104,33 98,36 104,39 98,42 104,45 98,48 104,51 98,54 104,57 98,60 104,63 98,66" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linejoin="round"/>

    <!-- Inner bore circle at bottom -->
    <line x1="54" y1="68" x2="86" y2="68" stroke="#1a1a2e" stroke-width="1.5"/>

    <!-- Gap arrow -->
    <line x1="70" y1="76" x2="70" y2="104" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="5 4"/>
    <polygon points="65,100 70,110 75,100" fill="#1a1a2e"/>

    <!-- FEMALE ADAPTER (smooth outside, threads inside) -->
    <rect x="34" y="116" width="72" height="42" stroke="#1a1a2e" stroke-width="2.5" fill="none" rx="2"/>

    <!-- Inner bore (larger — female) -->
    <rect x="46" y="116" width="48" height="42" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-dasharray="3 2"/>

    <!-- Internal thread marks inside bore -->
    <polyline points="46,120 52,123 46,126 52,129 46,132 52,135 46,138 52,141 46,144 52,147 46,150 52,153 46,156" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linejoin="round" opacity="0.6"/>
    <polyline points="94,120 88,123 94,126 88,129 94,132 88,135 94,138 88,141 94,144 88,147 94,150 88,153 94,156" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linejoin="round" opacity="0.6"/>
  </svg>
  <div class="diagram-label">Male Tap</div>
  <div class="diagram-sub">Female adapter screws on</div>
</div>

<!-- FEMALE TAP + MALE ADAPTER -->
<div class="diagram">
  <svg width="140" height="200" viewBox="0 0 140 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- TAP SPOUT (coming from top) -->
    <rect x="34" y="0" width="72" height="14" stroke="#1a1a2e" stroke-width="2.5" fill="none"/>

    <!-- Collar -->
    <rect x="32" y="14" width="76" height="6" stroke="#1a1a2e" stroke-width="2.5" fill="none"/>

    <!-- Female threaded section — smooth outside -->
    <rect x="32" y="20" width="76" height="48" stroke="#1a1a2e" stroke-width="2.5" fill="none"/>

    <!-- Internal thread marks (inside the spout) -->
    <polyline points="40,24 46,27 40,30 46,33 40,36 46,39 40,42 46,45 40,48 46,51 40,54 46,57 40,60 46,63 40,66" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linejoin="round" opacity="0.6"/>
    <polyline points="100,24 94,27 100,30 94,33 100,36 94,39 100,42 94,45 100,48 94,51 100,54 94,57 100,60 94,63 100,66" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linejoin="round" opacity="0.6"/>

    <!-- Inner bore lines -->
    <line x1="40" y1="20" x2="40" y2="68" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="3 2"/>
    <line x1="100" y1="20" x2="100" y2="68" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="3 2"/>

    <!-- Gap arrow -->
    <line x1="70" y1="76" x2="70" y2="104" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="5 4"/>
    <polygon points="65,100 70,110 75,100" fill="#1a1a2e"/>

    <!-- MALE ADAPTER (external threads) -->
    <rect x="42" y="116" width="56" height="42" stroke="#1a1a2e" stroke-width="2.5" fill="none" rx="2"/>

    <!-- External threads on adapter -->
    <polyline points="42,120 36,123 42,126 36,129 42,132 36,135 42,138 36,141 42,144 36,147 42,150 36,153 42,156" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linejoin="round"/>
    <polyline points="98,120 104,123 98,126 104,129 98,132 104,135 98,138 104,141 98,144 104,147 98,150 104,153 98,156" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linejoin="round"/>

    <!-- Mesh screen on top of adapter -->
    <line x1="48" y1="116" x2="92" y2="116" stroke="#1a1a2e" stroke-width="1"/>
    <line x1="56" y1="112" x2="56" y2="120" stroke="#1a1a2e" stroke-width="1" opacity="0.5"/>
    <line x1="64" y1="112" x2="64" y2="120" stroke="#1a1a2e" stroke-width="1" opacity="0.5"/>
    <line x1="70" y1="112" x2="70" y2="120" stroke="#1a1a2e" stroke-width="1" opacity="0.5"/>
    <line x1="76" y1="112" x2="76" y2="120" stroke="#1a1a2e" stroke-width="1" opacity="0.5"/>
    <line x1="84" y1="112" x2="84" y2="120" stroke="#1a1a2e" stroke-width="1" opacity="0.5"/>
  </svg>
  <div class="diagram-label">Female Tap</div>
  <div class="diagram-sub">Male adapter screws in</div>
</div>

</body>
</html>
